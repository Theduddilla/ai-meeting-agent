version: '3.8'  

services:  
  db:  
    image: postgres:latest  
    environment:  
      POSTGRES_USER: user  
      POSTGRES_PASSWORD: password  
      POSTGRES_DB: mydatabase  
    ports:  
      - "5432:5432"  

  redis:  
    image: redis:latest  
    ports:  
      - "6379:6379"  

  weaviate:  
    image: semitechnologies/weaviate:latest  
    ports:  
      - "8080:8080"  
    environment:  
      - WEAVIATE_DEFAULT_VIRTUALIZATION_MIGRATION=false  

  backend:  
    build: ./backend  
    ports:  
      - "8000:8000"  
    depends_on:  
      - db  
      - redis  

  celery_worker:  
    build: ./backend  
    command: celery -A app.celery worker --loglevel=info  
    depends_on:  
      - backend  

  celery_beat:  
    build: ./backend  
    command: celery -A app.celery beat --loglevel=info  
    depends_on:  
      - backend  

  frontend:  
    build: ./frontend  
    ports:  
      - "3000:3000"  
    depends_on:  
      - backend
